{% extends 'base.html' %}

{% block extra_css %}
<style>
    .stat-card {
        @apply bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6;
    }
    .stat-value {
        @apply text-3xl font-bold text-[#0d141b] dark:text-white tracking-tight;
    }
    .stat-label {
        @apply text-sm text-gray-600 dark:text-gray-400 mt-1 font-medium;
    }
    .queue-item {
        @apply bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-3 hover:shadow-lg transition-shadow cursor-pointer;
    }
    .queue-header {
        @apply flex justify-between items-center mb-2;
    }
    .queue-patient {
        @apply font-bold text-lg text-[#0d141b] dark:text-white;
    }
    .queue-meta {
        @apply text-sm text-gray-500 dark:text-gray-400;
    }
    .status-badge {
        @apply px-2 py-1 rounded text-xs font-medium;
    }
    .status-pending {
        @apply bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400;
    }
    .status-completed {
        @apply bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400;
    }
    .status-in-progress {
        @apply bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400;
    }
    .status-waiting {
        @apply bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400;
    }
    .alert-low-stock {
        @apply bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500 p-4 rounded-r-lg;
    }
    .alert-expired {
        @apply bg-gray-50 dark:bg-gray-800 border-l-4 border-gray-500 p-4 rounded-r-lg;
    }
</style>
{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-[#0d141b] dark:text-white">
        {% block dashboard_title %}{{ block.super }}{% endblock %}
    </h1>
    <p class="text-gray-600 dark:text-gray-400">{% block dashboard_subtitle %}{% endblock %}</p>
</div>

{% block dashboard_content %}{% endblock %}
{% endblock %}
