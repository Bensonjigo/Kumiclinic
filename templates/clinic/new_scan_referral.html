{% extends 'base.html' %}

{% block title %}New Scan Referral - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow p-6">
        <h2 class="text-2xl font-bold mb-2">New Scan Referral</h2>
        {% if visit %}
        <p class="text-gray-500 mb-6">Patient: <strong>{{ visit.patient.full_name }}</strong></p>
        {% endif %}
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if not visit %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Visit</label>
                <select name="visit_id" required class="w-full px-4 py-2 border rounded-lg">
                    <option value="">Select Patient Visit</option>
                    {% for v in visits %}
                    <option value="{{ v.id }}">{{ v.patient.full_name }} - {{ v.reason_for_visit }}</option>
                    {% endfor %}
                </select>
            </div>
            {% else %}
            <input type="hidden" name="visit_id" value="{{ visit.id }}">
            {% endif %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Scan Type</label>
                <select name="scan_type" required class="w-full px-4 py-2 border rounded-lg">
                    <option value="">Select Type</option>
                    {% for type in scan_types %}
                    <option value="{{ type.code }}">{{ type.name }}</option>
                    {% empty %}
                    <option value="XRAY">X-Ray</option>
                    <option value="ULTRASOUND">Ultrasound</option>
                    <option value="CT_SCAN">CT Scan</option>
                    <option value="MRI">MRI</option>
                    <option value="ECG">ECG/EKG</option>
                    <option value="ECHO">Echocardiogram</option>
                    <option value="EEG">EEG</option>
                    <option value="OTHER">Other</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Or Specify Custom Type</label>
                <input type="text" name="custom_type" placeholder="Enter custom scan type" class="w-full px-4 py-2 border rounded-lg">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Clinical Notes</label>
                <textarea name="clinical_notes" rows="3" placeholder="Clinical information for the scan technician..."
                    class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 flex items-center gap-2">
                    <span class="material-symbols-outlined">send</span>
                    Create Referral
                </button>
                <a href="{% url 'dashboard_doctor' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
