{% extends 'base.html' %}

{% block title %}Consultation - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-2">Consultation</h2>
        <p class="text-gray-500 mb-6">Patient: <strong>{{ visit.patient.full_name }}</strong></p>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Diagnosis</label>
                <textarea name="diagnosis" required rows="3"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Treatment Plan</label>
                <textarea name="treatment_plan" rows="2"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Doctor Notes</label>
                <textarea name="doctor_notes" rows="2"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <div class="border-t pt-4">
                <h3 class="font-semibold mb-3">Prescribe Medicine</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Medicine</label>
                        <select name="medicine" class="w-full px-4 py-2 border rounded-lg">
                            <option value="">Select Medicine</option>
                            {% for medicine in medicines %}
                            <option value="{{ medicine.id }}">{{ medicine.name }} ({{ medicine.stock_quantity }} {{ medicine.unit }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Dosage</label>
                        <input type="text" name="dosage" placeholder="e.g., 2 tablets thrice daily"
                            class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                        <input type="number" name="quantity" min="1" placeholder="30"
                            class="w-full px-4 py-2 border rounded-lg">
                    </div>
                </div>
            </div>
            
            <div class="border-t pt-4">
                <h3 class="font-semibold mb-3">Request Lab Test</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lab Test</label>
                    <select name="lab_test" class="w-full px-4 py-2 border rounded-lg">
                        <option value="">No Lab Test</option>
                        <option value="CBC">Complete Blood Count</option>
                        <option value="URINALYSIS">Urinalysis</option>
                        <option value="STOOL_EXAM">Stool Examination</option>
                        <option value="BLOOD_SUGAR">Blood Sugar</option>
                        <option value="TYPHOID">Typhoid Test</option>
                        <option value="MALARIA">Malaria Test</option>
                        <option value="PREGNANCY">Pregnancy Test</option>
                    </select>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" onclick="return validateForm()" class="bg-orange-500 text-white px-6 py-2 rounded-lg hover:bg-orange-600">
                    Save Consultation
                </button>
                <a href="{% url 'pending_consultations' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function validateForm() {
    const diagnosis = document.querySelector('textarea[name="diagnosis"]').value.trim();
    if (!diagnosis) {
        alert('Please enter a diagnosis');
        return false;
    }
    
    const medicine = document.querySelector('select[name="medicine"]').value;
    const quantity = document.querySelector('input[name="quantity"]').value;
    
    if (medicine && !quantity) {
        alert('Please enter quantity when prescribing medicine');
        return false;
    }
    
    return true;
}
</script>
{% endblock %}
