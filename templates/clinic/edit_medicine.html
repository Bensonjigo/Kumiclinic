{% extends 'base.html' %}

{% block title %}Edit Medicine - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <div class="flex items-center gap-3">
            <a href="{% url 'medicines' %}" class="text-gray-500 hover:text-gray-700">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div>
                <h1 class="text-3xl font-black text-[#0d141b] dark:text-white flex items-center gap-3">
                    <span class="w-12 h-12 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <span class="material-symbols-outlined text-2xl">edit</span>
                    </span>
                    Edit Medicine
                </h1>
                <p class="text-gray-600 dark:text-gray-400 mt-1">Update medicine details</p>
            </div>
        </div>
    </div>

    <form method="post" class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Basic Info -->
            <div class="md:col-span-2">
                <h3 class="text-lg font-semibold text-[#0d141b] dark:text-white mb-4 pb-2 border-b">Basic Information</h3>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Medicine Name *</label>
                <input type="text" name="name" required value="{{ medicine.name }}"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category *</label>
                <select name="category" required
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="TABLET" {% if medicine.category == 'TABLET' %}selected{% endif %}>Tablet</option>
                    <option value="CAPSULE" {% if medicine.category == 'CAPSULE' %}selected{% endif %}>Capsule</option>
                    <option value="SYRUP" {% if medicine.category == 'SYRUP' %}selected{% endif %}>Syrup</option>
                    <option value="INJECTION" {% if medicine.category == 'INJECTION' %}selected{% endif %}>Injection</option>
                    <option value="CREAM" {% if medicine.category == 'CREAM' %}selected{% endif %}>Cream</option>
                    <option value="OINTMENT" {% if medicine.category == 'OINTMENT' %}selected{% endif %}>Ointment</option>
                    <option value="DROP" {% if medicine.category == 'DROP' %}selected{% endif %}>Drop</option>
                    <option value="SOLUTION" {% if medicine.category == 'SOLUTION' %}selected{% endif %}>Solution</option>
                    <option value="OTHER" {% if medicine.category == 'OTHER' %}selected{% endif %}>Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Unit *</label>
                <input type="text" name="unit" required value="{{ medicine.unit }}"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Current Stock</label>
                <input type="text" value="{{ medicine.stock_quantity }} {{ medicine.unit }}" disabled
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-600 text-gray-500">
                <p class="text-xs text-gray-500 mt-1">Use "Add Stock" to update quantity</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Minimum Stock Level</label>
                <input type="number" name="minimum_stock_level" min="0" value="{{ medicine.minimum_stock_level }}"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Storage Location</label>
                <input type="text" name="location" value="{{ medicine.location|default:'' }}"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>

            <!-- Supplier -->
            <div class="md:col-span-2 mt-4">
                <h3 class="text-lg font-semibold text-[#0d141b] dark:text-white mb-4 pb-2 border-b">Supplier Information</h3>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Supplier</label>
                <select name="supplier"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="">Select Supplier</option>
                    <option value="JMS" {% if medicine.supplier == 'JMS' %}selected{% endif %}>JMS Pharmaceuticals</option>
                    <option value="PHARMACCESS" {% if medicine.supplier == 'PHARMACCESS' %}selected{% endif %}>PharmAccess</option>
                    <option value="SPS" {% if medicine.supplier == 'SPS' %}selected{% endif %}>SPS Pharmaceuticals</option>
                    <option value="ABU" {% if medicine.supplier == 'ABU' %}selected{% endif %}>Abu Pharmaceutical</option>
                    <option value="LOCAL" {% if medicine.supplier == 'LOCAL' %}selected{% endif %}>Local Supplier</option>
                    <option value="OTHER" {% if medicine.supplier == 'OTHER' %}selected{% endif %}>Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Supplier Contact</label>
                <input type="text" name="supplier_contact" value="{{ medicine.supplier_contact|default:'' }}"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
        </div>

        <div class="mt-6 flex gap-4">
            <button type="submit" class="px-6 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700">
                Save Changes
            </button>
            <a href="{% url 'medicines' %}" class="px-6 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
