{% extends 'base.html' %}

{% block title %}New Visit - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-6">Create New Visit</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Patient</label>
                <select name="patient" id="patient-select" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">-- Select a patient --</option>
                    {% for patient in patients %}
                    <option value="{{ patient.id }}">{{ patient.full_name }} ({{ patient.university_id }}) - {{ patient.get_patient_type_display }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Reason for Visit</label>
                <textarea name="reason_for_visit" required rows="3" placeholder="Describe the symptoms or reason for visit..."
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Create Visit
                </button>
                <a href="{% url 'dashboard' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
