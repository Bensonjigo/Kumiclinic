{% extends 'base.html' %}

{% block title %}New Visit - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-6">Create New Visit</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Search Patient</label>
                <input type="text" id="patient-search" placeholder="Search by name or University ID..." 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                    hx-get="/api/patients/autocomplete/" 
                    hx-trigger="keyup changed delay:300ms" 
                    hx-target="#patient-results"
                    hx-indicator=".search-loading">
                <div class="search-loading absolute right-8 top-8 hidden">
                    <i class="fas fa-spinner fa-spin text-gray-400"></i>
                </div>
                <div id="patient-results" class="mt-1 border rounded-lg max-h-48 overflow-y-auto hidden bg-white shadow-lg z-10"></div>
                <input type="hidden" name="patient" id="selected-patient-id" required>
                <div id="selected-patient-info" class="mt-2 p-3 bg-blue-50 rounded-lg hidden">
                    <p class="font-medium" id="selected-patient-name"></p>
                    <p class="text-sm text-gray-500" id="selected-patient-details"></p>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Reason for Visit</label>
                <textarea name="reason_for_visit" required rows="3" placeholder="Describe the symptoms or reason for visit..."
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Create Visit
                </button>
                <a href="{% url 'dashboard' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('htmx:configRequest', (event) => {
    const searchInput = document.getElementById('patient-search');
    event.detail.parameters.q = searchInput.value;
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('#patient-search') && !e.target.closest('#patient-results')) {
        document.getElementById('patient-results').classList.add('hidden');
    }
});

function selectPatient(id, name, universityId, type) {
    document.getElementById('selected-patient-id').value = id;
    document.getElementById('patient-search').value = name + ' (' + universityId + ')';
    document.getElementById('selected-patient-name').textContent = name;
    document.getElementById('selected-patient-details').textContent = universityId + ' - ' + type;
    document.getElementById('selected-patient-info').classList.remove('hidden');
    document.getElementById('patient-results').classList.add('hidden');
}
</script>
{% endblock %}
