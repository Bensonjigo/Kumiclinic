{% extends 'base.html' %}

{% block title %}New Visit - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl sm:text-4xl font-black text-[#0d141b] dark:text-white tracking-tight">New Visit</h1>
        <p class="text-base text-gray-600 dark:text-gray-400 mt-1">Create a new visit for an existing patient.</p>
    </div>
    
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
        <form method="post">
            {% csrf_token %}
            
            <!-- Visit Information -->
            <div class="mb-8">
                <h2 class="text-xl font-bold text-[#0d141b] dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">Visit Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Search Patient *</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-gray-400">search</span>
                            <input type="text" id="patient-search" placeholder="Search by name or university ID..." 
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                        </div>
                        <div id="patient-results" class="mt-2 max-h-48 overflow-y-auto border border-gray-200 dark:border-gray-700 rounded-lg hidden">
                        </div>
                        <input type="hidden" name="patient" id="selected-patient-id" required>
                        <div id="selected-patient-info" class="mt-2 p-3 bg-primary/10 rounded-lg hidden">
                            <p class="font-medium text-primary"><span class="material-symbols-outlined text-lg align-middle">check_circle</span> <span id="selected-patient-name"></span></p>
                            <p class="text-sm text-gray-600" id="selected-patient-details"></p>
                        </div>
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Reason for Visit <span class="text-gray-500 font-normal">(Optional)</span></label>
                        <textarea name="reason_for_visit" rows="2" placeholder="Describe the symptoms or reason for visit..."
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"></textarea>
                    </div>
                </div>
            </div>
            
            <!-- Vital Signs Section -->
            <div class="mb-8">
                <h2 class="text-xl font-bold text-[#0d141b] dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">Vital Signs <span class="text-sm font-normal text-gray-500">(Optional)</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Temperature (°C)</label>
                        <input type="number" step="0.1" name="temperature" placeholder="37.0"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Blood Pressure</label>
                        <input type="text" name="blood_pressure" placeholder="120/80"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Weight (kg)</label>
                        <input type="number" step="0.1" name="weight" placeholder="70"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Heart Rate (bpm)</label>
                        <input type="number" name="heart_rate" placeholder="72"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Symptoms</label>
                        <textarea name="symptoms" rows="2"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"></textarea>
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nurse Notes</label>
                        <textarea name="nurse_notes" rows="2"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"></textarea>
                    </div>
                </div>
            </div>
            
            <!-- Form Actions -->
            <div class="flex flex-wrap justify-end items-center gap-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <a href="{% url 'dashboard' %}" class="px-6 py-3 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 font-medium">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 font-medium">
                    Create Visit & Record Vitals
                </button>
            </div>
        </form>
    </div>
</div>

<script>
const patientSearch = document.getElementById('patient-search');
const patientResults = document.getElementById('patient-results');
const selectedPatientId = document.getElementById('selected-patient-id');
const selectedPatientInfo = document.getElementById('selected-patient-info');
const selectedPatientName = document.getElementById('selected-patient-name');
const selectedPatientDetails = document.getElementById('selected-patient-details');

const patients = {{ patients_json|safe }};

patientSearch.addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    
    if (searchTerm.length < 2) {
        patientResults.classList.add('hidden');
        return;
    }
    
    const filtered = patients.filter(p => 
        p.full_name.toLowerCase().includes(searchTerm) || 
        (p.university_id && p.university_id.toLowerCase().includes(searchTerm))
    );
    
    if (filtered.length > 0) {
        patientResults.innerHTML = filtered.map(p => `
            <div class="p-3 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer border-b border-gray-100 dark:border-gray-700 last:border-0" 
                 onclick="selectPatient(${p.id}, '${p.full_name}', '${p.university_id} - ${p.patient_type}')">
                <p class="font-medium text-[#0d141b] dark:text-white">${p.full_name}</p>
                <p class="text-sm text-gray-500">${p.university_id} - ${p.patient_type}</p>
            </div>
        `).join('');
        patientResults.classList.remove('hidden');
    } else {
        patientResults.innerHTML = '<div class="p-3 text-gray-500">No patients found</div>';
        patientResults.classList.remove('hidden');
    }
});

function selectPatient(id, name, details) {
    selectedPatientId.value = id;
    selectedPatientName.textContent = name;
    selectedPatientDetails.textContent = details;
    patientResults.classList.add('hidden');
    patientSearch.value = '';
    patientSearch.classList.add('hidden');
    selectedPatientInfo.classList.remove('hidden');
}

document.addEventListener('click', function(e) {
    if (!patientSearch.contains(e.target) && !patientResults.contains(e.target)) {
        patientResults.classList.add('hidden');
    }
});
</script>
{% endblock %}
