{% extends 'base.html' %}

{% block title %}Edit Patient - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl sm:text-4xl font-black text-[#0d141b] dark:text-white tracking-tight">Edit Patient</h1>
        <p class="text-base text-gray-600 dark:text-gray-400 mt-1">Update patient information.</p>
    </div>
    
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
        <form method="post" action="{% url 'edit_patient' patient.id %}">
            {% csrf_token %}
            
            <!-- Personal Details Section -->
            <div class="mb-8">
                <h2 class="text-xl font-bold text-[#0d141b] dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">Personal Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Full Name *</label>
                        <input type="text" name="full_name" required value="{{ patient.full_name }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="Enter full name">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Date of Birth *</label>
                        <input type="date" name="date_of_birth" required value="{{ patient.date_of_birth|date:'Y-m-d' }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Gender *</label>
                        <select name="gender" required
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                            <option value="">Select gender</option>
                            <option value="MALE" {% if patient.gender == 'MALE' %}selected{% endif %}>Male</option>
                            <option value="FEMALE" {% if patient.gender == 'FEMALE' %}selected{% endif %}>Female</option>
                            <option value="OTHER" {% if patient.gender == 'OTHER' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Patient Type *</label>
                        <select name="patient_type" id="patientType" required
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary">
                            <option value="">Select patient type</option>
                            <option value="STUDENT" {% if patient.patient_type == 'STUDENT' %}selected{% endif %}>Student</option>
                            <option value="STAFF" {% if patient.patient_type == 'STAFF' %}selected{% endif %}>Staff</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">University ID *</label>
                        <input type="text" name="university_id" id="universityId" required value="{{ patient.university_id }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="STU/2024/001">
                    </div>
                </div>
            </div>
            
            <!-- Contact Information Section -->
            <div class="mb-8">
                <h2 class="text-xl font-bold text-[#0d141b] dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">Contact Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number *</label>
                        <input type="tel" name="phone" required value="{{ patient.phone }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="+2567...">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                        <input type="email" name="email" value="{{ patient.email|default:'' }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="email@example.com">
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Address</label>
                        <textarea name="address"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="Enter full address" rows="2">{{ patient.address|default:'' }}</textarea>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Department</label>
                        <input type="text" name="department" value="{{ patient.department|default:'' }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="e.g. Computer Science">
                    </div>
                </div>
            </div>
            
            <!-- Next of Kin Section -->
            <div class="mb-8">
                <h2 class="text-xl font-bold text-[#0d141b] dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">Next of Kin Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
                        <input type="text" name="next_of_kin_name" value="{{ patient.next_of_kin_name|default:'' }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="Enter full name">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Relationship</label>
                        <input type="text" name="next_of_kin_relationship" value="{{ patient.next_of_kin_relationship|default:'' }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="e.g. Spouse, Parent, Sibling">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Contact Number</label>
                        <input type="tel" name="next_of_kin_contact" value="{{ patient.next_of_kin_contact|default:'' }}"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="+2567...">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Address</label>
                        <textarea name="next_of_kin_address"
                            class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-background-light dark:bg-slate-800 text-[#0d141b] dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary"
                            placeholder="Enter address" rows="2">{{ patient.next_of_kin_address|default:'' }}</textarea>
                    </div>
                </div>
            </div>
            
            <!-- Form Actions -->
            <div class="flex flex-wrap justify-end items-center gap-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <a href="{% url 'patient_detail' patient.id %}" class="px-6 py-3 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 font-medium">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 font-medium">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
