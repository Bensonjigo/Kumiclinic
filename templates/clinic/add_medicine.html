{% extends 'base.html' %}

{% block title %}Add Medicine - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <div class="flex items-center gap-3">
            <a href="{% url 'medicines' %}" class="text-gray-500 hover:text-gray-700">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div>
                <h1 class="text-3xl font-black text-[#0d141b] dark:text-white flex items-center gap-3">
                    <span class="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <span class="material-symbols-outlined text-2xl">add</span>
                    </span>
                    Add New Medicine
                </h1>
                <p class="text-gray-600 dark:text-gray-400 mt-1">Add a new medicine to inventory</p>
            </div>
        </div>
    </div>

    <form method="post" class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Basic Info -->
            <div class="md:col-span-2">
                <h3 class="text-lg font-semibold text-[#0d141b] dark:text-white mb-4 pb-2 border-b">Basic Information</h3>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Medicine Name *</label>
                <input type="text" name="name" required placeholder="e.g., Paracetamol"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category *</label>
                <select name="category" required
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="">Select Category</option>
                    <option value="TABLET">Tablet</option>
                    <option value="CAPSULE">Capsule</option>
                    <option value="SYRUP">Syrup</option>
                    <option value="INJECTION">Injection</option>
                    <option value="CREAM">Cream</option>
                    <option value="OINTMENT">Ointment</option>
                    <option value="DROP">Drop</option>
                    <option value="SOLUTION">Solution</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Unit *</label>
                <input type="text" name="unit" required placeholder="e.g., tablets, ml, bottles"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Initial Stock Quantity</label>
                <input type="number" name="stock_quantity" min="0" value="0"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Minimum Stock Level</label>
                <input type="number" name="minimum_stock_level" min="0" value="10"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Storage Location</label>
                <input type="text" name="location" placeholder="e.g., Shelf A-1"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>

            <!-- Supplier -->
            <div class="md:col-span-2 mt-4">
                <h3 class="text-lg font-semibold text-[#0d141b] dark:text-white mb-4 pb-2 border-b">Supplier Information</h3>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Supplier</label>
                <select name="supplier"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="">Select Supplier</option>
                    <option value="JMS">JMS Pharmaceuticals</option>
                    <option value="PHARMACCESS">PharmAccess</option>
                    <option value="SPS">SPS Pharmaceuticals</option>
                    <option value="ABU">Abu Pharmaceutical</option>
                    <option value="LOCAL">Local Supplier</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Supplier Contact</label>
                <input type="text" name="supplier_contact" placeholder="Phone or email"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
        </div>

        <div class="mt-6 flex gap-4">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Add Medicine
            </button>
            <a href="{% url 'medicines' %}" class="px-6 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
