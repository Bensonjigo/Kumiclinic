<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent - Kumi University Clinic</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3A7D9D",
                        "background-light": "#F4F7F9",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">
    <div class="relative flex min-h-screen w-full flex-col items-center justify-center">
        <div class="absolute top-0 left-0 w-full px-4 sm:px-8 md:px-12 lg:px-20 py-5">
            <header class="flex items-center justify-between whitespace-nowrap">
                <div class="flex items-center gap-4 text-slate-900 dark:text-slate-50">
                    <img src="/media/KUMI-UNIVERSITY-LOGO.png" alt="Logo" class="h-10 w-auto">
                    <h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">Kumi University Clinic</h2>
                </div>
            </header>
        </div>
        <main class="container mx-auto flex w-full max-w-md flex-1 items-center justify-center px-4 py-20">
            <div class="w-full overflow-hidden rounded-xl bg-white shadow-lg dark:bg-background-dark dark:border dark:border-slate-800 p-8 text-center">
                <div class="mb-6">
                    <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30">
                        <span class="material-symbols-outlined text-3xl text-green-600">check_circle</span>
                    </div>
                    <p class="text-slate-900 dark:text-white text-2xl font-bold leading-tight tracking-[-0.033em]">Check Your Email</p>
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-normal mt-2">
                        We've emailed you instructions for setting your password. You should receive them shortly.
                    </p>
                </div>
                <a href="{% url 'login' %}" class="flex h-12 w-full items-center justify-center rounded-lg bg-primary text-base font-bold text-white transition-colors hover:bg-primary/90">Back to Login</a>
            </div>
        </main>
    </div>
</body>
</html>
