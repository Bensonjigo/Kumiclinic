{% extends 'base.html' %}

{% block title %}New Lab Request - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
        <h2 class="text-2xl font-bold mb-2 text-[#0d141b] dark:text-white">Order Lab Test</h2>
        {% if visit %}
        <p class="text-gray-500 mb-6">Patient: <strong>{{ visit.patient.full_name }}</strong></p>
        {% endif %}
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if not visit %}
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Select Visit</label>
                <select name="visit_id" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="">Select Patient Visit</option>
                    {% for v in visits %}
                    <option value="{{ v.id }}">{{ v.patient.full_name }} - {{ v.reason_for_visit }}</option>
                    {% endfor %}
                </select>
            </div>
            {% else %}
            <input type="hidden" name="visit_id" value="{{ visit.id }}">
            {% endif %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Lab Test</label>
                <select name="test_type" id="testTypeSelect" onchange="toggleCustomTest()" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="">Select Lab Test</option>
                    {% for test in lab_test_types %}
                    <option value="{{ test.id }}">{{ test.name }}</option>
                    {% endfor %}
                    <option value="other">Other (Custom)</option>
                </select>
            </div>
            
            <div id="customTestField" class="hidden">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Custom Test Name</label>
                <input type="text" name="custom_test_name" placeholder="Enter custom test name" 
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Clinical Notes / Instructions</label>
                <textarea name="notes" rows="3" placeholder="Enter any relevant clinical notes or instructions..."
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Order Lab Test
                </button>
                <a href="{% url 'dashboard_doctor' %}" class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 px-6 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleCustomTest() {
    const select = document.getElementById('testTypeSelect');
    const customField = document.getElementById('customTestField');
    
    if (select.value === 'other') {
        customField.classList.remove('hidden');
    } else {
        customField.classList.add('hidden');
    }
}
</script>
{% endblock %}
