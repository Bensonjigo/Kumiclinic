{% extends 'base.html' %}

{% block title %}New Lab Request - Kumi University Clinic{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-2">Order Lab Test</h2>
        {% if visit %}
        <p class="text-gray-500 mb-6">Patient: <strong>{{ visit.patient.full_name }}</strong></p>
        {% endif %}
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if not visit %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Visit</label>
                <select name="visit_id" required class="w-full px-4 py-2 border rounded-lg">
                    <option value="">Select Patient Visit</option>
                    {% for v in visits %}
                    <option value="{{ v.id }}">{{ v.patient.full_name }} - {{ v.reason_for_visit }}</option>
                    {% endfor %}
                </select>
            </div>
            {% else %}
            <input type="hidden" name="visit_id" value="{{ visit.id }}">
            {% endif %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Lab Test</label>
                <select name="test_name" required class="w-full px-4 py-2 border rounded-lg">
                    <option value="">Select Lab Test</option>
                    <option value="CBC">Complete Blood Count (CBC)</option>
                    <option value="URINALYSIS">Urinalysis</option>
                    <option value="STOOL_EXAM">Stool Examination</option>
                    <option value="BLOOD_SUGAR">Blood Sugar</option>
                    <option value="TYPHOID">Typhoid Test</option>
                    <option value="MALARIA">Malaria Test</option>
                    <option value="PREGNANCY">Pregnancy Test</option>
                    <option value="LIVER_FUNCTION">Liver Function Test</option>
                    <option value="KIDNEY_FUNCTION">Kidney Function Test</option>
                    <option value="LIPID_PROFILE">Lipid Profile</option>
                    <option value="THYROID">Thyroid Function Test</option>
                    <option value="HIV">HIV Test</option>
                    <option value="HEPATITIS">Hepatitis B/C Test</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Clinical Notes / Instructions</label>
                <textarea name="notes" rows="3" placeholder="Enter any relevant clinical notes or instructions..."
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Order Lab Test
                </button>
                <a href="{% url 'dashboard_doctor' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
